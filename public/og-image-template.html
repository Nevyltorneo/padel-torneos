<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Image Template - MiTorneo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #1a73e8 0%, #4285f4 100%);
            font-family: 'Arial', 'Helvetica', sans-serif;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 60px;
            max-width: 1000px;
        }

        .main-title {
            font-size: 84px;
            font-weight: 900;
            margin-bottom: 20px;
            line-height: 0.9;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            letter-spacing: -2px;
        }

        .subtitle {
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 40px;
            opacity: 0.95;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .description {
            font-size: 24px;
            font-weight: 400;
            line-height: 1.4;
            opacity: 0.9;
            max-width: 800px;
            margin: 0 auto;
        }

        .bottom-accent {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 12px;
            background: rgba(255, 255, 255, 0.2);
        }

        .url {
            position: absolute;
            bottom: 30px;
            right: 40px;
            font-size: 20px;
            font-weight: 500;
            opacity: 0.8;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
        }

        .feature {
            font-size: 18px;
            font-weight: 500;
            opacity: 0.9;
        }

        .feature::before {
            content: "• ";
            color: rgba(255, 255, 255, 0.8);
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="bottom-accent"></div>

    <div class="container">
        <h1 class="main-title">MiTorneo</h1>
        <h2 class="subtitle">Sistema Profesional de<br>Torneos de Pádel</h2>

        <p class="description">
            Organiza torneos de pádel de manera profesional con nuestro sistema completo de gestión.
        </p>

        <div class="features">
            <span class="feature">Grupos automáticos</span>
            <span class="feature">Brackets dinámicos</span>
            <span class="feature">Estadísticas en vivo</span>
        </div>
    </div>

    <div class="url">padel-torneos.vercel.app</div>
</body>

</html>
