<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1a73e8"/>

  <!-- Main content -->
  <g transform="translate(600, 315)">
    <!-- Logo/Padel icon -->
    <g transform="translate(-150, -120)">
      <circle cx="150" cy="120" r="90" fill="white"/>
      <path d="M60 70 L240 70 L255 85 L255 155 L240 170 L60 170 L45 155 L45 85 Z" fill="#1a73e8" stroke="white" stroke-width="4"/>
      <rect x="105" y="170" width="90" height="25" fill="#1a73e8" stroke="white" stroke-width="4"/>
      <circle cx="195" cy="120" r="15" fill="#1a73e8"/>
      <line x1="45" y1="55" x2="75" y2="55" stroke="white" stroke-width="6" stroke-linecap="round"/>
      <line x1="45" y1="185" x2="75" y2="185" stroke="white" stroke-width="6" stroke-linecap="round"/>
    </g>

    <!-- Text -->
    <text x="200" y="-40" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="bold" fill="white">MiTorneo</text>
    <text x="200" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="rgba(255,255,255,0.95)">Sistema de Torneos de Pádel</text>
    <text x="200" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="rgba(255,255,255,0.9)">• Grupos automáticos</text>
    <text x="200" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="rgba(255,255,255,0.9)">• Calendarios inteligentes</text>
    <text x="200" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="rgba(255,255,255,0.9)">• Seguimiento en vivo</text>
  </g>

