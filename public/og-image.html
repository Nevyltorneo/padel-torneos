<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Image Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #1a73e8 0%, #4285f4 100%);
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .container {
            display: flex;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 60px;
        }

        .logo-section {
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            margin-right: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .logo-racket {
            width: 180px;
            height: 180px;
            background: #1a73e8;
            border-radius: 15px;
            position: relative;
        }

        .logo-handle {
            width: 90px;
            height: 45px;
            background: #1a73e8;
            border-radius: 8px;
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
        }

        .logo-circle {
            width: 30px;
            height: 30px;
            background: #1a73e8;
            border-radius: 50%;
            position: absolute;
            top: 30px;
            right: 30px;
        }

        .text-section {
            flex: 1;
            padding-left: 40px;
        }

        .main-title {
            font-size: 84px;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 42px;
            margin-bottom: 15px;
            opacity: 0.95;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .tagline {
            font-size: 32px;
            margin-bottom: 50px;
            opacity: 0.9;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .features {
            font-size: 28px;
            line-height: 1.4;
            opacity: 0.9;
        }

        .feature {
            margin-bottom: 8px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .url {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            opacity: 0.8;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .bottom-accent {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>
    <div class="bottom-accent"></div>

    <div class="container">
        <div class="logo-section">
            <div class="logo-racket">
                <div class="logo-circle"></div>
                <div class="logo-handle"></div>
            </div>
        </div>

        <div class="text-section">
            <h1 class="main-title">MiTorneo</h1>
            <h2 class="subtitle">Sistema de Torneos</h2>
            <h3 class="tagline">de Pádel</h3>

            <div class="features">
                <div class="feature">• Grupos automáticos</div>
                <div class="feature">• Calendarios inteligentes</div>
                <div class="feature">• Seguimiento en vivo</div>
            </div>
        </div>
    </div>

    <div class="url">padel-torneos.vercel.app</div>
</body>

</html>
