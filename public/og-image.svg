  <rect x="0" y="580" width="1200" height="50" fill="rgba(255,255,255,0.15)"/>
  <text x="600" y="610" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="rgba(255,255,255,0.8)">padel-torneos.vercel.app</text>
